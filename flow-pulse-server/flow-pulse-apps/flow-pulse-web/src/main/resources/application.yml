server:
  port: 8466
  servlet:
    context-path: /flowpulse
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: flowpulse
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:D:/codex/FlowPulse/flow-pulse-server/flow-pulse-apps/flow-pulse-web/data/flowpulse;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: flowpulse
    password: flowpulse
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-h2.sql
  jackson:
    default-property-inclusion: non_null
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

flowpulse:
  metric:
    collection:
      scan-delay-ms: 5000
      worker-size: 4
      batch-size: 50
