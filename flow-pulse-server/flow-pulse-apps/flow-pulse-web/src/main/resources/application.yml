server:
  port: 8466
  servlet:
    context-path: /flowpulse
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: flowpulse
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:${flowpulse_data_dir:./data}/flowpulse;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: flowpulse
    password: flowpulse
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-h2.sql
  jackson:
    default-property-inclusion: non_null
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
# Dubbo (Alibaba Dubbo, used by own-consumer-spring-boot-starter for Tenant registration)
dubbo:
  application:
    name: ${spring.application.name}
  registry:
    protocol: zookeeper
    address: ${zk.url}
    timeout: 30000
  protocol:
    name: dubbo
    port: -1
  consumer:
    check: false
    timeout: 30000

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 分布式配置中心 Apollo（公司标准 SDK: uyun.whale:distributed-config）
whale:
  distributed:
    config:
      app:
        id: platform
      server:
        url: http://10.1.53.201:7546
      namespaces: common.properties
      bootstrap:
        enabled: true
        eagerLoad:
          enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

flowpulse:
  metric:
    collection:
      scan-delay-ms: 5000
      worker-size: 4
      batch-size: 50
